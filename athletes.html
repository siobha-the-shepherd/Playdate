<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playdate — Find Athletes</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    #map { height: calc(100vh - 120px); width: 100%; }
    .filters {
      background: white;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #eee;
      flex-wrap: wrap;
    }
    .filters select {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid #ccc;
      cursor: pointer;
    }
    .filters label {
      font-size: 13px;
      color: #888;
    }
    .popup-name { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 15px; }
    .popup-sport { color: #F7567C; font-weight: 600; font-size: 13px; margin: 2px 0; }
    .popup-meta { font-size: 12px; color: #888; margin-bottom: 8px; }
    .popup-btn {
      background: #F7567C;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 7px 16px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
    }

    @media (max-width: 768px) {
      #map { height: calc(100vh - 160px); }
      .filters {
        padding: 8px 12px;
        gap: 6px;
      }
      .filters select {
        font-size: 12px;
        padding: 5px 10px;
      }
    }
  </style>
</head>
<body style="padding-top: 0; text-align: left;">

  <nav>
    <span onclick="window.location.href='index.html'" style="cursor: pointer;">Playdate</span>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="signup.html">Sign Up</a>
    <a href="signup.html" class="profile-icon">👤</a>
  </nav>

  <div class="filters" style="margin-top: 55px;">
    <label>Filter:</label>
    <select id="filter-sport">
      <option value="">All Sports</option>
      <option value="Tennis">Tennis</option>
      <option value="Basketball">Basketball</option>
      <option value="Running">Running</option>
      <option value="Soccer">Soccer</option>
      <option value="Pickleball">Pickleball</option>
      <option value="Cycling">Cycling</option>
    </select>
    <select id="filter-distance">
      <option value="10">Within 10 miles</option>
      <option value="5">Within 5 miles</option>
      <option value="2">Within 2 miles</option>
    </select>
    <select id="filter-skill">
      <option value="">All Vibes</option>
      <option value="Just for laughs">Just for laughs</option>
      <option value="Friendly match">Friendly match</option>
      <option value="Bring it on">Bring it on</option>
    </select>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const athletes = [
      { name: "Maya R.",   sport: "Tennis",     skill: "Friendly match",  distance: 1.2, lat: 25.7650, lng: -80.1950 },
      { name: "Jordan K.", sport: "Basketball", skill: "Bring it on",     distance: 0.8, lat: 25.7580, lng: -80.1880 },
      { name: "Priya S.",  sport: "Running",    skill: "Just for laughs", distance: 3.1, lat: 25.7700, lng: -80.1970 },
      { name: "Carlos M.", sport: "Soccer",     skill: "Friendly match",  distance: 4.5, lat: 25.7530, lng: -80.1840 },
      { name: "Alex T.",   sport: "Tennis",     skill: "Bring it on",     distance: 2.3, lat: 25.7620, lng: -80.1920 },
      { name: "Sam L.",    sport: "Basketball", skill: "Just for laughs", distance: 1.7, lat: 25.7680, lng: -80.1900 },
    ];

    const sportColors = {
      Tennis: "#F7567C",
      Basketball: "#00B2A9",
      Running: "#F7567C",
      Soccer: "#00B2A9",
      Pickleball: "#F7567C",
      Cycling: "#00B2A9"
    };

    const map = L.map('map').setView([25.7617, -80.1918], 13);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO'
    }).addTo(map);

    let markers = [];

    function makeIcon(sport) {
      const color = sportColors[sport] || "#F7567C";
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="42" viewBox="0 0 32 42">
        <path d="M16 0 C7.2 0 0 7.2 0 16 C0 28 16 42 16 42 C16 42 32 28 32 16 C32 7.2 24.8 0 16 0Z" fill="${color}" stroke="white" stroke-width="2"/>
        <circle cx="16" cy="16" r="8" fill="white" opacity="0.3"/>
      </svg>`;
      return L.divIcon({
        html: svg,
        className: '',
        iconSize: [32, 42],
        iconAnchor: [16, 42],
        popupAnchor: [0, -44]
      });
    }

    function renderMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const sport = document.getElementById('filter-sport').value;
      const distance = parseFloat(document.getElementById('filter-distance').value);
      const skill = document.getElementById('filter-skill').value;

      athletes.filter(a =>
        (!sport || a.sport === sport) &&
        (!skill || a.skill === skill) &&
        a.distance <= distance
      ).forEach(a => {
        const marker = L.marker([a.lat, a.lng], { icon: makeIcon(a.sport) })
          .addTo(map)
          .bindPopup(`
            <div class="popup-name">${a.name}</div>
            <div class="popup-sport">${a.sport}</div>
            <div class="popup-meta">${a.skill} · ${a.distance} miles away</div>
            <button class="popup-btn" onclick="window.location.href='signup.html'">Schedule a Playdate ↗</button>
          `);
        markers.push(marker);
      });
    }

    map.whenReady(() => renderMarkers());

    document.getElementById('filter-sport').addEventListener('change', renderMarkers);
    document.getElementById('filter-distance').addEventListener('change', renderMarkers);
    document.getElementById('filter-skill').addEventListener('change', renderMarkers);
  </script>
</body>
</html>
