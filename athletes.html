<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playdate — Find Athletes</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    #map { height: calc(100vh - 120px); width: 100%; }
    .filters {
      background: white;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #eee;
      flex-wrap: wrap;
    }
    .filters select {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid #ccc;
      cursor: pointer;
    }
    .filters label {
      font-size: 13px;
      color: #888;
    }
    .popup-name { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 15px; }
    .popup-sport { color: #F7567C; font-weight: 600; font-size: 13px; margin: 2px 0; }
    .popup-vibe { display: inline-block; background: #f0fafa; color: #00B2A9; border: 1.5px solid #00B2A9; border-radius: 20px; font-size: 11px; font-weight: 600; padding: 2px 10px; margin: 4px 0 6px; font-family: 'Plus Jakarta Sans', sans-serif; }
    .popup-meta { font-size: 12px; color: #888; margin-bottom: 8px; }
    .popup-btn {
      background: #F7567C;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 7px 16px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
    }
    #location-banner {
      background: #fff8f9;
      border-bottom: 1px solid #f7567c33;
      padding: 10px 20px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      color: #888;
      text-align: center;
      display: none;
    }

    .map-wrap {
      position: relative;
    }

    #empty-state {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 500;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #empty-state.visible {
      display: flex;
    }

    .empty-card {
      background: white;
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      max-width: 320px;
      pointer-events: all;
    }

    .empty-card .empty-emoji {
      font-size: 48px;
      margin-bottom: 14px;
    }

    .empty-card h3 {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 600;
      color: #111;
      margin: 0 0 10px;
    }

    .empty-card p {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      color: #888;
      line-height: 1.6;
      margin: 0 0 20px;
    }

    .empty-card a {
      display: inline-block;
      background: #F7567C;
      color: white;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 22px;
      border-radius: 20px;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      #map { height: calc(100vh - 180px); }
      .filters {
        padding: 8px 12px;
        gap: 6px;
      }
      .filters select {
        font-size: 12px;
        padding: 5px 10px;
      }
    }

    /* Playdate request confirmation modal */
    #playdate-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #playdate-modal.visible { display: flex; }
    .modal-card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px 32px;
      text-align: center;
      max-width: 340px;
      width: 100%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.2);
      animation: modal-pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modal-pop {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .modal-icon { font-size: 52px; margin-bottom: 14px; }
    .modal-title {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 22px;
      color: #111;
      margin: 0 0 8px;
    }
    .modal-athlete {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #F7567C;
      margin: 0 0 10px;
    }
    .modal-msg {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      color: #888;
      line-height: 1.6;
      margin: 0 0 26px;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: center; }
    .modal-close {
      flex: 1;
      background: #F7567C;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 11px 20px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .modal-close:hover { background: #e04570; }
    .modal-notif {
      flex: 1;
      background: white;
      color: #F7567C;
      border: 1.5px solid #F7567C;
      border-radius: 20px;
      padding: 11px 20px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .modal-notif:hover { background: #fff0f4; }
  </style>
</head>
<body style="padding-top: 0; text-align: left;">

  <nav>
    <span onclick="window.location.href='index.html'" style="cursor: pointer;">Playdate</span>
    <button class="hamburger" id="hamburger" onclick="document.getElementById('nav-links').classList.toggle('open');this.classList.toggle('open')" aria-label="Open menu">
        <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="athletes.html">Find Athletes</a>
        <a href="notifications.html">Notifications</a>
        <a href="signup.html">Sign Up</a>
        <a href="profile.html" class="profile-icon">👤</a>
    </div>
  </nav>

  <div id="location-banner">📍 Using your location to find nearby athletes</div>

  <div class="filters" style="margin-top: 55px;">
    <label>Filter:</label>
    <select id="filter-sport">
      <option value="">All Sports</option>
      <option value="Tennis">Tennis</option>
      <option value="Basketball">Basketball</option>
      <option value="Running">Running</option>
      <option value="Soccer">Soccer</option>
      <option value="Pickleball">Pickleball</option>
      <option value="Cycling">Cycling</option>
      <option value="Other">Other</option>
    </select>
    <select id="filter-distance">
      <option value="15">Within 15 miles</option>
      <option value="5">Within 5 miles</option>
      <option value="30">Within 30 miles</option>
    </select>
    <select id="filter-skill">
      <option value="">All Vibes</option>
      <option value="Just for laughs">Just for laughs</option>
      <option value="Friendly match">Friendly match</option>
      <option value="Bring it on">Bring it on</option>
    </select>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
    <div id="empty-state">
      <div class="empty-card">
        <div class="empty-emoji">🏅</div>
        <h3>No athletes nearby yet</h3>
        <p>Check back soon — or invite a friend to join Playdate and make the first move.</p>
        <a href="signup.html">Invite a Friend ↗</a>
      </div>
    </div>
  </div>

  <!-- Playdate request confirmation modal -->
  <div id="playdate-modal">
    <div class="modal-card">
      <div class="modal-icon">🎉</div>
      <div class="modal-title">Playdate Request Sent!</div>
      <div class="modal-athlete" id="modal-athlete-name"></div>
      <p class="modal-msg">We'll let you know when they respond.</p>
      <div class="modal-actions">
        <button class="modal-close" onclick="closeModal()">Done</button>
        <button class="modal-notif" onclick="window.location.href='notifications.html'">View Requests</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const athletes = [
      // ~1–5 miles from Vero Beach center
      { name: "Marcus Rivera",    sport: "Tennis",     skill: "Bring it on",    lat: 27.6510, lng: -80.3770 },
      { name: "Priya Nair",       sport: "Running",    skill: "Just for laughs",lat: 27.5950, lng: -80.3970 },
      { name: "Jake Thompson",    sport: "Pickleball", skill: "Friendly match", lat: 27.6400, lng: -80.4210 },
      { name: "Sofia Delgado",    sport: "Soccer",     skill: "Friendly match", lat: 27.6650, lng: -80.4370 },
      { name: "Carlos Webb",      sport: "Basketball", skill: "Bring it on",    lat: 27.6060, lng: -80.3680 },
      // ~6–13 miles from Vero Beach center
      { name: "Aisha Brooks",     sport: "Cycling",    skill: "Just for laughs",lat: 27.7410, lng: -80.4000 },
      { name: "Derek Fontaine",   sport: "Tennis",     skill: "Friendly match", lat: 27.5830, lng: -80.4840 },
      { name: "Lena Kowalski",    sport: "Running",    skill: "Bring it on",    lat: 27.7380, lng: -80.3300 },
      { name: "Omar Castillo",    sport: "Pickleball", skill: "Just for laughs",lat: 27.4800, lng: -80.3920 },
      { name: "Natalie Cruz",     sport: "Soccer",     skill: "Bring it on",    lat: 27.7270, lng: -80.4910 },
      { name: "Ryan Okafor",      sport: "Basketball", skill: "Friendly match", lat: 27.5730, lng: -80.3430 },
      { name: "Jade Mercado",     sport: "Cycling",    skill: "Bring it on",    lat: 27.8270, lng: -80.3850 },
      // ~18–22 miles from Vero Beach center
      { name: "Tyler Nguyen",     sport: "Running",    skill: "Just for laughs",lat: 27.3770, lng: -80.4280 },
      { name: "Simone Hardy",     sport: "Basketball", skill: "Just for laughs",lat: 27.8750, lng: -80.5650 },
      { name: "Leo Papadopoulos", sport: "Pickleball", skill: "Friendly match", lat: 27.9570, lng: -80.3730 },
    ];

    const sportColors = {
      Tennis: "#F7567C",
      Basketball: "#00B2A9",
      Running: "#F7567C",
      Soccer: "#00B2A9",
      Pickleball: "#F7567C",
      Cycling: "#00B2A9"
    };

    let userLat = 27.6386;
    let userLng = -80.3973;

    const map = L.map('map').setView([userLat, userLng], 13);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO'
    }).addTo(map);

    let markers = [];
    let userMarker = null;

    function getDistanceMiles(lat1, lng1, lat2, lng2) {
      const R = 3958.8;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function makeIcon(sport) {
      const color = sportColors[sport] || "#F7567C";
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="42" viewBox="0 0 32 42">
        <path d="M16 0 C7.2 0 0 7.2 0 16 C0 28 16 42 16 42 C16 42 32 28 32 16 C32 7.2 24.8 0 16 0Z" fill="${color}" stroke="white" stroke-width="2"/>
        <circle cx="16" cy="16" r="8" fill="white" opacity="0.3"/>
      </svg>`;
      return L.divIcon({ html: svg, className: '', iconSize: [32, 42], iconAnchor: [16, 42], popupAnchor: [0, -44] });
    }

    function makeUserIcon() {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">
        <circle cx="11" cy="11" r="9" fill="#4A90E2" stroke="white" stroke-width="3"/>
      </svg>`;
      return L.divIcon({ html: svg, className: '', iconSize: [22, 22], iconAnchor: [11, 11] });
    }

    function renderMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const sport = document.getElementById('filter-sport').value;
      const maxDistance = parseFloat(document.getElementById('filter-distance').value);
      const skill = document.getElementById('filter-skill').value;

      athletes.forEach(a => {
        const dist = getDistanceMiles(userLat, userLng, a.lat, a.lng);
        if (
          (!sport || a.sport === sport) &&
          (!skill || a.skill === skill) &&
          dist <= maxDistance
        ) {
          const marker = L.marker([a.lat, a.lng], { icon: makeIcon(a.sport) })
            .addTo(map)
            .bindPopup(`
              <div class="popup-name">${a.name}</div>
              <div class="popup-sport">${a.sport}</div>
              <div><span class="popup-vibe">${a.skill}</span></div>
              <div class="popup-meta">${dist.toFixed(1)} miles away</div>
              <button class="popup-btn" onclick="requestPlaydate(${JSON.stringify(a.name)}, ${JSON.stringify(a.sport)})">Schedule a Playdate</button>
            `);
          markers.push(marker);
        }
      });

      document.getElementById('empty-state').classList.toggle('visible', markers.length === 0);
    }

    function placeUserMarker() {
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker([userLat, userLng], { icon: makeUserIcon() })
        .addTo(map)
        .bindPopup("📍 You are here");
    }

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;
          map.setView([userLat, userLng], 13);
          document.getElementById('location-banner').style.display = 'block';
          placeUserMarker();
          renderMarkers();
        },
        () => {
          placeUserMarker();
          renderMarkers();
        }
      );
    } else {
      placeUserMarker();
      renderMarkers();
    }

    document.getElementById('filter-sport').addEventListener('change', renderMarkers);
    document.getElementById('filter-distance').addEventListener('change', renderMarkers);
    document.getElementById('filter-skill').addEventListener('change', renderMarkers);

    function requestPlaydate(name, sport) {
      const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      let requests = [];
      try {
        const parsed = JSON.parse(localStorage.getItem('playdateRequests') || '[]');
        requests = Array.isArray(parsed) ? parsed : [];
      } catch (e) {}
      requests.push({ name, sport, date: today, status: 'pending' });
      localStorage.setItem('playdateRequests', JSON.stringify(requests));
      document.getElementById('modal-athlete-name').textContent = name;
      document.getElementById('playdate-modal').classList.add('visible');
      map.closePopup();
    }

    function closeModal() {
      document.getElementById('playdate-modal').classList.remove('visible');
    }

    document.getElementById('playdate-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
