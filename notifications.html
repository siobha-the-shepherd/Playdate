<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playdate — Notifications</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fraunces:wght@600&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      padding-top: 55px;
      min-height: 100vh;
    }

    .page-header {
      text-align: center;
      padding: 44px 20px 28px;
    }

    .page-header h1 {
      font-family: 'Pacifico', cursive;
      font-size: 36px;
      color: #000;
      margin-bottom: 8px;
    }

    .page-header p {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      color: #888;
      margin: 0;
    }

    .requests-list {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .request-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      padding: 22px 24px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .request-info { flex: 1; min-width: 0; }

    .request-name {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 18px;
      color: #111;
      margin-bottom: 4px;
    }

    .request-sport {
      display: inline-block;
      background: #fff0f4;
      color: #F7567C;
      border: 1.5px solid #F7567C;
      border-radius: 20px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      margin-bottom: 8px;
    }

    .request-date {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 14px;
    }

    .request-actions {
      display: flex;
      gap: 8px;
    }

    .btn-accept {
      background: #00B2A9;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 7px 16px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-accept:hover { background: #009e96; }

    .btn-decline {
      background: white;
      color: #F7567C;
      border: 1.5px solid #F7567C;
      border-radius: 20px;
      padding: 7px 16px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-decline:hover { background: #fff0f4; }

    .status-badge {
      flex-shrink: 0;
      align-self: flex-start;
      padding: 5px 13px;
      border-radius: 20px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge-pending  { background: #fff8e1; color: #b45309; border: 1.5px solid #f59e0b; }
    .badge-accepted { background: #e6faf9; color: #00836e; border: 1.5px solid #00B2A9; }
    .badge-declined { background: #fff0f4; color: #c4315a; border: 1.5px solid #F7567C; }

    /* Empty state */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 20px;
    }
    .empty-state.visible { display: flex; }

    .empty-emoji { font-size: 56px; margin-bottom: 18px; }

    .empty-state h2 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 22px;
      color: #111;
      margin: 0 0 10px;
    }

    .empty-state p {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      color: #888;
      margin: 0 0 28px;
      line-height: 1.6;
    }

    .empty-state a {
      display: inline-block;
      background: #F7567C;
      color: white;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      padding: 12px 28px;
      border-radius: 30px;
      text-decoration: none;
    }
    .empty-state a:hover { background: #e04570; }

    @media (max-width: 768px) {
      .page-header h1 { font-size: 28px; }
      .request-card { flex-direction: column; gap: 12px; }
      .status-badge { align-self: flex-start; }
    }
  </style>
</head>
<body>

  <nav>
    <span onclick="window.location.href='index.html'" style="cursor: pointer;">Playdate</span>
    <button class="hamburger" id="hamburger" onclick="document.getElementById('nav-links').classList.toggle('open');this.classList.toggle('open')" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="athletes.html">Find Athletes</a>
      <a href="notifications.html">Notifications</a>
      <a href="signup.html">Sign Up</a>
      <a href="profile.html" class="profile-icon">👤</a>
    </div>
  </nav>

  <div class="page-header">
    <h1>Notifications</h1>
    <p>Your playdate requests</p>
  </div>

  <div class="empty-state" id="empty-state">
    <div class="empty-emoji">🏅</div>
    <h2>No playdates yet</h2>
    <p>Get out there — find athletes near you and send your first request!</p>
    <a href="athletes.html">Find Athletes ↗</a>
  </div>

  <div class="requests-list" id="requests-list"></div>

  <script>
    function loadRequests() {
      try {
        const parsed = JSON.parse(localStorage.getItem('playdateRequests') || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    function saveRequests(requests) {
      localStorage.setItem('playdateRequests', JSON.stringify(requests));
    }

    function updateStatus(index, status) {
      const requests = loadRequests();
      if (requests[index]) {
        requests[index].status = status;
        saveRequests(requests);
        render();
      }
    }

    function render() {
      const raw = loadRequests();

      const requests = raw.filter(function (req) {
        return req && typeof req === 'object'
          && typeof req.name === 'string' && req.name.trim()
          && typeof req.sport === 'string' && req.sport.trim();
      });

      if (requests.length !== raw.length) {
        saveRequests(requests);
      }

      const list = document.getElementById('requests-list');
      const empty = document.getElementById('empty-state');
      list.innerHTML = '';

      if (requests.length === 0) {
        empty.classList.add('visible');
        return;
      }

      empty.classList.remove('visible');

      requests.forEach(function(req, i) {
        const card = document.createElement('div');
        card.className = 'request-card';

        const badgeClass = req.status === 'accepted' ? 'badge-accepted'
                         : req.status === 'declined' ? 'badge-declined'
                         : 'badge-pending';

        const actionsHTML = req.status === 'pending'
          ? `<div class="request-actions">
               <button class="btn-accept" onclick="updateStatus(${i}, 'accepted')">Accept</button>
               <button class="btn-decline" onclick="updateStatus(${i}, 'declined')">Decline</button>
             </div>`
          : '';

        const safeName = req.name.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const safeSport = req.sport.replace(/</g, '&lt;').replace(/>/g, '&gt;');

        card.innerHTML = `
          <div class="request-info">
            <div class="request-name">${safeName}</div>
            <div><span class="request-sport">${safeSport}</span></div>
            <div class="request-date">Requested ${req.date}</div>
            ${actionsHTML}
          </div>
          <div class="status-badge ${badgeClass}">${req.status}</div>
        `;

        list.appendChild(card);
      });
    }

    render();
  </script>
</body>
</html>
