<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playdate — Notifications</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="storage.js"></script>
  <script src="supabase.js"></script>
  <style>
    body {
      padding-top: 55px;
      min-height: 100vh;
      background: #f7f8fa;
    }

    /* ── Page hero ───────────────────────────────────────────────────── */
    .page-hero {
      background: white;
      border-bottom: 1.5px solid #f0f0f0;
      padding: 40px 24px 32px;
      text-align: center;
    }

    .hero-pip-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    .hero-pip {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .hero-title {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 36px;
      color: #111;
      letter-spacing: -0.5px;
      margin: 0 0 8px;
      line-height: 1.1;
    }

    .hero-subtitle {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #bbb;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }

    /* ── Requests list ───────────────────────────────────────────────── */
    .requests-list {
      max-width: 560px;
      margin: 0 auto;
      padding: 32px 20px 64px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .request-card {
      background: white;
      border-radius: 22px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
      padding: 24px 24px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      transition: box-shadow 0.2s ease, transform 0.15s ease;
    }
    .request-card-pending {
      border-left: 4px solid #F7567C;
    }
    .request-card-pending:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      transform: translateY(-1px);
    }
    .request-card-accepted {
      background: #f0fdf9;
      border-left: 4px solid #00B2A9;
    }
    .request-card-declined {
      background: #f7f7f8;
      border-left: 4px solid #d0d0d0;
    }

    .request-info { flex: 1; min-width: 0; }

    .request-name {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 19px;
      color: #111;
      margin-bottom: 7px;
      letter-spacing: -0.2px;
      line-height: 1.15;
    }

    .request-sport {
      display: inline-block;
      background: #fff0f4;
      color: #F7567C;
      border: 1.5px solid #F7567C;
      border-radius: 20px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 11px;
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .request-date {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      color: #bbb;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .request-actions {
      display: flex;
      gap: 8px;
    }

    .btn-accept {
      background: #00B2A9;
      color: white;
      border: none;
      border-radius: 22px;
      padding: 9px 18px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,178,169,0.30);
      transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
    }
    .btn-accept:hover {
      background: #009e96;
      box-shadow: 0 6px 18px rgba(0,178,169,0.40);
      transform: translateY(-1px);
    }

    .btn-decline {
      background: white;
      color: #F7567C;
      border: 1.5px solid #F7567C;
      border-radius: 22px;
      padding: 9px 18px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .btn-decline:hover { background: #fff0f4; }

    .status-badge {
      flex-shrink: 0;
      align-self: flex-start;
      padding: 5px 14px;
      border-radius: 20px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .badge-pending  { background: #fff8e1; color: #b45309; border: 1.5px solid #f59e0b; }
    .badge-accepted { background: #e6faf9; color: #00836e; border: 1.5px solid #00B2A9; }
    .badge-declined { background: #f0f0f2; color: #888;    border: 1.5px solid #d0d0d0; }

    /* ── Clear completed ─────────────────────────────────────────── */
    .clear-section {
      max-width: 560px;
      margin: 0 auto;
      padding: 16px 20px 0;
      display: flex;
      justify-content: flex-end;
    }

    .clear-btn {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #bbb;
      background: none;
      border: 1.5px solid #e8e8e8;
      border-radius: 20px;
      padding: 7px 16px;
      cursor: pointer;
      margin: 0;
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    .clear-btn:hover { color: #F7567C; border-color: #F7567C; }

    /* ── Empty state ─────────────────────────────────────────────────── */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 20px;
    }
    .empty-state.visible { display: flex; }

    .empty-emoji { font-size: 64px; margin-bottom: 22px; display: block; }

    .empty-state h2 {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 26px;
      color: #111;
      margin: 0 0 12px;
      letter-spacing: -0.3px;
    }

    .empty-state p {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      color: #999;
      margin: 0 0 32px;
      line-height: 1.65;
      max-width: 300px;
    }

    .empty-state a {
      display: inline-block;
      background: #F7567C;
      color: white;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 14px 32px;
      border-radius: 30px;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(247,86,124,0.38);
      transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }
    .empty-state a:hover {
      background: #e04570;
      box-shadow: 0 10px 28px rgba(247,86,124,0.45);
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      .hero-title { font-size: 28px; }
      .page-hero { padding: 28px 20px 22px; }
      .request-card { flex-direction: column; gap: 12px; }
      .status-badge { align-self: flex-start; }
    }
  </style>
</head>
<body>

  <nav>
    <span onclick="window.location.href='index.html'" style="cursor: pointer;">Playdate</span>
    <button class="hamburger" id="hamburger" onclick="document.getElementById('nav-links').classList.toggle('open');this.classList.toggle('open')" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Home</a>
      <a href="athletes.html">Find Athletes</a>
      <a href="notifications.html">Notifications</a>
      <a href="signup.html" id="nav-signup">Sign Up</a>
      <a href="profile.html" class="profile-icon">👤</a>
    </div>
  </nav>
  <script>initNavAuth();</script>

  <div class="page-hero">
    <div class="hero-pip-row">
      <div class="hero-pip" style="background:#F7567C;"></div>
      <div class="hero-pip" style="background:#FE5733;"></div>
      <div class="hero-pip" style="background:#00B2A9;"></div>
    </div>
    <h1 class="hero-title">Notifications</h1>
    <p class="hero-subtitle">Your playdate requests</p>
  </div>

  <div class="empty-state" id="empty-state">
    <div class="empty-emoji">🏅</div>
    <h2>No playdates yet</h2>
    <p>Get out there — find athletes near you and send your first request!</p>
    <a href="athletes.html">Find Athletes ↗</a>
  </div>

  <div class="clear-section" id="clear-section" style="display:none;">
    <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
  </div>

  <div class="requests-list" id="requests-list"></div>

  <script>
    var currentUserId = null;
    var usingSupabase = false;

    async function initCurrentUser() {
      try {
        var result = await sb.auth.getSession();
        var session = result.data && result.data.session;
        currentUserId = session ? session.user.id : null;
      } catch (e) {
        currentUserId = null;
      }
    }

    function _safeString(value, fallback) {
      return typeof value === 'string' ? value : fallback;
    }

    async function fetchRequests() {
      if (currentUserId) {
        try {
          var result = await sb.from('Requests')
            .select('*')
            .eq('recipient_id', currentUserId)
            .eq('hidden_by_recipient', false)
            .order('requested_at', { ascending: false });
          if (!result.error && Array.isArray(result.data)) {
            usingSupabase = true;
            return {
              source: 'supabase',
              data: result.data.map(function(row) {
                return {
                  id:     row.id,
                  name:   _safeString(row.athlete_name, 'Unknown'),
                  sport:  _safeString(row.sport, 'Unknown'),
                  date:   row.requested_at,
                  status: row.status
                };
              })
            };
          }
        } catch (e) { /* fall through to localStorage */ }
      }
      usingSupabase = false;
      return { source: 'local', data: PlaydateStorage.getRequests() };
    }

    async function updateStatus(requestId, status) {
      if (usingSupabase) {
        try {
          await sb.from('Requests').update({ status: status }).eq('id', requestId);
        } catch (e) {}
        render();
        return;
      }
      var requests = PlaydateStorage.getRequests();
      if (requests[requestId]) {
        requests[requestId].status = status;
        PlaydateStorage.setRequests(requests);
        render();
      }
    }

    function formatDate(dateStr) {
      if (!dateStr || typeof dateStr !== 'string') return 'Unknown date';
      // Legacy format (not ISO) — display as-is
      if (dateStr.indexOf('T') === -1) return dateStr;
      var d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      var months = ['January','February','March','April','May','June','July',
                    'August','September','October','November','December'];
      var hours = d.getHours();
      var minutes = d.getMinutes();
      var ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      if (hours === 0) hours = 12;
      var minStr = minutes < 10 ? '0' + minutes : String(minutes);
      return months[d.getMonth()] + ' ' + d.getDate() + ' at ' + hours + ':' + minStr + ' ' + ampm;
    }

    async function clearCompleted() {
      var fetched = await fetchRequests();
      if (fetched.source === 'supabase') {
        var completed = fetched.data.filter(function (req) {
          return req.status === 'accepted' || req.status === 'declined';
        });
        try {
          await Promise.all(completed.map(function (req) {
            return sb.from('Requests').update({ hidden_by_recipient: true }).eq('id', req.id);
          }));
        } catch (e) {}
        render();
        return;
      }
      var remaining = PlaydateStorage.getRequests().filter(function (req) {
        return req.status !== 'accepted' && req.status !== 'declined';
      });
      PlaydateStorage.setRequests(remaining);
      render();
    }

    async function render() {
      var requests = (await fetchRequests()).data;

      const list = document.getElementById('requests-list');
      const empty = document.getElementById('empty-state');
      const clearSection = document.getElementById('clear-section');
      list.innerHTML = '';

      if (requests.length === 0) {
        empty.classList.add('visible');
        clearSection.style.display = 'none';
        return;
      }

      empty.classList.remove('visible');

      const hasCompleted = requests.some(function(r) {
        return r.status === 'accepted' || r.status === 'declined';
      });
      clearSection.style.display = hasCompleted ? 'flex' : 'none';

      requests.forEach(function(req, i) {
        const isAccepted = req.status === 'accepted';
        const isDeclined = req.status === 'declined';

        const card = document.createElement('div');
        card.className = 'request-card ' + (isAccepted ? 'request-card-accepted'
                                           : isDeclined ? 'request-card-declined'
                                           : 'request-card-pending');

        const badgeClass = isAccepted ? 'badge-accepted'
                         : isDeclined ? 'badge-declined'
                         : 'badge-pending';
        const badgeText  = isAccepted ? '✓ Accepted'
                         : isDeclined ? '✗ Declined'
                         : 'Pending';

        const requestId = req.id !== undefined ? req.id : i;
        const idLiteral = JSON.stringify(requestId);

        const actionsHTML = (!isAccepted && !isDeclined)
          ? `<div class="request-actions">
               <button class="btn-accept" onclick="updateStatus(${idLiteral}, 'accepted')">Accept</button>
               <button class="btn-decline" onclick="updateStatus(${idLiteral}, 'declined')">Decline</button>
             </div>`
          : '';

        const safeName  = req.name.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const safeSport = req.sport.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const safeDate  = formatDate(
          typeof req.date === 'string' ? req.date.replace(/<[^>]*>/g, '') : ''
        );

        card.innerHTML = `
          <div class="request-info">
            <div class="request-name">${safeName}</div>
            <div><span class="request-sport">${safeSport}</span></div>
            <div class="request-date">Requested ${safeDate}</div>
            ${actionsHTML}
          </div>
          <div class="status-badge ${badgeClass}">${badgeText}</div>
        `;

        list.appendChild(card);
      });
    }

    (async function() {
      await initCurrentUser();
      render();
    })();
  </script>
</body>
</html>
