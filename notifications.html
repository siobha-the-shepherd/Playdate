<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playdate — Notifications</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      padding-top: 55px;
      min-height: 100vh;
      background: #f7f8fa;
    }

    /* ── Page hero ───────────────────────────────────────────────────── */
    .page-hero {
      background: white;
      border-bottom: 1.5px solid #f0f0f0;
      padding: 40px 24px 32px;
      text-align: center;
    }

    .hero-pip-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    .hero-pip {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .hero-title {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 36px;
      color: #111;
      letter-spacing: -0.5px;
      margin: 0 0 8px;
      line-height: 1.1;
    }

    .hero-subtitle {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #bbb;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }

    /* ── Requests list ───────────────────────────────────────────────── */
    .requests-list {
      max-width: 560px;
      margin: 0 auto;
      padding: 32px 20px 64px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .request-card {
      background: white;
      border-radius: 22px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
      padding: 24px 24px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      transition: box-shadow 0.2s ease, transform 0.15s ease;
    }
    .request-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      transform: translateY(-1px);
    }

    .request-info { flex: 1; min-width: 0; }

    .request-name {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 19px;
      color: #111;
      margin-bottom: 7px;
      letter-spacing: -0.2px;
      line-height: 1.15;
    }

    .request-sport {
      display: inline-block;
      background: #fff0f4;
      color: #F7567C;
      border: 1.5px solid #F7567C;
      border-radius: 20px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 11px;
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .request-date {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      color: #bbb;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .request-actions {
      display: flex;
      gap: 8px;
    }

    .btn-accept {
      background: #00B2A9;
      color: white;
      border: none;
      border-radius: 22px;
      padding: 9px 18px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,178,169,0.30);
      transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
    }
    .btn-accept:hover {
      background: #009e96;
      box-shadow: 0 6px 18px rgba(0,178,169,0.40);
      transform: translateY(-1px);
    }

    .btn-decline {
      background: white;
      color: #F7567C;
      border: 1.5px solid #F7567C;
      border-radius: 22px;
      padding: 9px 18px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .btn-decline:hover { background: #fff0f4; }

    .status-badge {
      flex-shrink: 0;
      align-self: flex-start;
      padding: 5px 14px;
      border-radius: 20px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .badge-pending  { background: #fff8e1; color: #b45309; border: 1.5px solid #f59e0b; }
    .badge-accepted { background: #e6faf9; color: #00836e; border: 1.5px solid #00B2A9; }
    .badge-declined { background: #fff0f4; color: #c4315a; border: 1.5px solid #F7567C; }

    /* ── Empty state ─────────────────────────────────────────────────── */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 20px;
    }
    .empty-state.visible { display: flex; }

    .empty-emoji { font-size: 64px; margin-bottom: 22px; display: block; }

    .empty-state h2 {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 26px;
      color: #111;
      margin: 0 0 12px;
      letter-spacing: -0.3px;
    }

    .empty-state p {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      color: #999;
      margin: 0 0 32px;
      line-height: 1.65;
      max-width: 300px;
    }

    .empty-state a {
      display: inline-block;
      background: #F7567C;
      color: white;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 14px 32px;
      border-radius: 30px;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(247,86,124,0.38);
      transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }
    .empty-state a:hover {
      background: #e04570;
      box-shadow: 0 10px 28px rgba(247,86,124,0.45);
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      .hero-title { font-size: 28px; }
      .page-hero { padding: 28px 20px 22px; }
      .request-card { flex-direction: column; gap: 12px; }
      .status-badge { align-self: flex-start; }
    }
  </style>
</head>
<body>

  <nav>
    <span onclick="window.location.href='index.html'" style="cursor: pointer;">Playdate</span>
    <button class="hamburger" id="hamburger" onclick="document.getElementById('nav-links').classList.toggle('open');this.classList.toggle('open')" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Home</a>
      <a href="athletes.html">Find Athletes</a>
      <a href="notifications.html">Notifications</a>
      <a href="signup.html" id="nav-signup">Sign Up</a>
      <a href="profile.html" class="profile-icon">👤</a>
    </div>
  </nav>
  <script>if(localStorage.getItem('playdateUser')){document.getElementById('nav-signup').style.display='none';}</script>

  <div class="page-hero">
    <div class="hero-pip-row">
      <div class="hero-pip" style="background:#F7567C;"></div>
      <div class="hero-pip" style="background:#FE5733;"></div>
      <div class="hero-pip" style="background:#00B2A9;"></div>
    </div>
    <h1 class="hero-title">Notifications</h1>
    <p class="hero-subtitle">Your playdate requests</p>
  </div>

  <div class="empty-state" id="empty-state">
    <div class="empty-emoji">🏅</div>
    <h2>No playdates yet</h2>
    <p>Get out there — find athletes near you and send your first request!</p>
    <a href="athletes.html">Find Athletes ↗</a>
  </div>

  <div class="requests-list" id="requests-list"></div>

  <script>
    function loadRequests() {
      try {
        const parsed = JSON.parse(localStorage.getItem('playdateRequests') || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    function saveRequests(requests) {
      localStorage.setItem('playdateRequests', JSON.stringify(requests));
    }

    function updateStatus(index, status) {
      const requests = loadRequests();
      if (requests[index]) {
        requests[index].status = status;
        saveRequests(requests);
        render();
      }
    }

    function render() {
      const raw = loadRequests();

      const requests = raw.filter(function (req) {
        return req && typeof req === 'object'
          && typeof req.name === 'string' && req.name.trim()
          && typeof req.sport === 'string' && req.sport.trim();
      });

      if (requests.length !== raw.length) {
        saveRequests(requests);
      }

      const list = document.getElementById('requests-list');
      const empty = document.getElementById('empty-state');
      list.innerHTML = '';

      if (requests.length === 0) {
        empty.classList.add('visible');
        return;
      }

      empty.classList.remove('visible');

      requests.forEach(function(req, i) {
        const card = document.createElement('div');
        card.className = 'request-card';

        const badgeClass = req.status === 'accepted' ? 'badge-accepted'
                         : req.status === 'declined' ? 'badge-declined'
                         : 'badge-pending';

        const actionsHTML = req.status === 'pending'
          ? `<div class="request-actions">
               <button class="btn-accept" onclick="updateStatus(${i}, 'accepted')">Accept</button>
               <button class="btn-decline" onclick="updateStatus(${i}, 'declined')">Decline</button>
             </div>`
          : '';

        const safeName = req.name.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const safeSport = req.sport.replace(/</g, '&lt;').replace(/>/g, '&gt;');

        card.innerHTML = `
          <div class="request-info">
            <div class="request-name">${safeName}</div>
            <div><span class="request-sport">${safeSport}</span></div>
            <div class="request-date">Requested ${req.date}</div>
            ${actionsHTML}
          </div>
          <div class="status-badge ${badgeClass}">${req.status}</div>
        `;

        list.appendChild(card);
      });
    }

    render();
  </script>
</body>
</html>
